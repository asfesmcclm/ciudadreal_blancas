<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Censo Ciudad Real 2026</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#c0001e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --red: #c0001e;
      --red-dim: rgba(192,0,30,0.12);
      --fica-color: #0284c7;
      --fica-bg: #f0f9ff;
      --fica-border: #bae6fd;
      --fesmc-color: #d97706;
      --fesmc-bg: #fffbeb;
      --fesmc-border: #fde68a;
      --sp-color: #dc2626;
      --sp-bg: #fef2f2;
      --sp-border: #fecaca;
      --bg: #f4f5f8;
      --card: #ffffff;
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
      --radius: 16px;
      --font: 'Outfit', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; overscroll-behavior: none; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(160deg, #1a0005 0%, #3d0010 50%, #c0001e 100%);
      padding: 48px 20px 28px;
      padding-top: max(48px, calc(env(safe-area-inset-top) + 20px));
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 80% 0%, rgba(255,50,70,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 10% 100%, rgba(100,0,20,0.4) 0%, transparent 50%);
    }
    .header-inner { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }
    .logo-badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 5px 12px;
      font-size: 11px; font-weight: 800;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: clamp(24px, 6.5vw, 36px);
      font-weight: 900; color: #fff;
      line-height: 1.1; letter-spacing: -0.02em;
    }
    .header h1 span { color: rgba(255,180,170,0.9); }
    .header-sub { margin-top: 6px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55); }

    /* ── SEARCH ZONE ── */
    .search-zone {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(to bottom, rgba(26,0,5,0.95) 0%, rgba(244,245,248,0.97) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 14px 16px 12px;
    }
    .search-wrap { max-width: 680px; margin: 0 auto; }
    .search-box {
      position: relative; display: flex; align-items: center;
      background: #fff; border-radius: 14px;
      border: 2px solid var(--border);
      box-shadow: var(--shadow-lg);
      transition: border-color 0.2s, box-shadow 0.2s; overflow: hidden;
    }
    .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 4px var(--red-dim), var(--shadow-lg); }
    .search-icon { flex-shrink: 0; width: 48px; display: flex; align-items: center; justify-content: center; color: var(--text-3); transition: color 0.2s; }
    .search-box:focus-within .search-icon { color: var(--red); }
    .search-icon svg { width: 20px; height: 20px; }
    #buscador {
      flex: 1; border: none; outline: none;
      font-family: var(--font); font-size: 16px; font-weight: 500;
      color: var(--text); background: transparent;
      padding: 14px 0; min-width: 0;
    }
    #buscador::placeholder { color: var(--text-3); font-weight: 400; }
    .clear-btn {
      display: none; width: 40px; height: 40px; margin-right: 4px;
      border: none; background: var(--bg); border-radius: 10px;
      cursor: pointer; align-items: center; justify-content: center;
      color: var(--text-2); flex-shrink: 0; transition: background 0.15s;
    }
    .clear-btn:active { background: var(--border); }
    .clear-btn svg { width: 16px; height: 16px; }
    .clear-btn.visible { display: flex; }

    /* ── FILTERS ── */
    .filters-row {
      display: flex; gap: 8px; margin-top: 10px;
      overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .filters-row::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex-shrink: 0; border-radius: 50px; padding: 7px 14px;
      font-family: var(--font); font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.18s;
      background: rgba(255,255,255,0.85); color: var(--text-2);
      border: 1.5px solid var(--border);
    }
    .filter-pill:active { transform: scale(0.95); }
    .filter-pill.active-all  { background: var(--text); color: #fff; border-color: var(--text); }
    .filter-pill.active-fica { background: var(--fica-color); color: #fff; border-color: var(--fica-color); }
    .filter-pill.active-fesmc{ background: var(--fesmc-color); color: #fff; border-color: var(--fesmc-color); }
    .filter-pill.active-sp   { background: var(--sp-color); color: #fff; border-color: var(--sp-color); }

    /* ── STATS / EXPORT BAR ── */
    .meta-bar {
      max-width: 680px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px 4px;
    }
    .stats-count { font-size: 13px; font-weight: 600; color: var(--text-2); }
    .stats-count strong { color: var(--text); }
    .btn-export {
      display: flex; align-items: center; gap: 5px;
      background: #16803c; color: #fff;
      border: none; border-radius: 9px;
      padding: 7px 12px;
      font-family: var(--font); font-size: 11px; font-weight: 800;
      letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-export:active { transform: scale(0.95); opacity: 0.9; }
    .btn-export svg { width: 14px; height: 14px; }

    /* ── CONTENT ── */
    .content { max-width: 680px; margin: 0 auto; padding: 12px 16px 100px; }

    /* ── CARDS ── */
    .empresa-list { display: flex; flex-direction: column; gap: 12px; }

    .empresa-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      opacity: 0; transform: translateY(10px);
      animation: slideUp 0.22s ease forwards;
      position: relative;
    }
    .empresa-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 5px;
    }
    .empresa-card.type-fica { border-color: var(--fica-border); }
    .empresa-card.type-fica::before { background: var(--fica-color); }
    .empresa-card.type-fesmc { border-color: var(--fesmc-border); }
    .empresa-card.type-fesmc::before { background: var(--fesmc-color); }
    .empresa-card.type-sp { border-color: var(--sp-border); }
    .empresa-card.type-sp::before { background: var(--sp-color); }

    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .card-inner { padding: 14px 16px 14px 20px; }

    /* top row */
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .card-empresa { font-size: 14px; font-weight: 800; color: var(--text); line-height: 1.3; text-transform: uppercase; }
    .card-badge {
      display: inline-flex; align-items: center; gap: 3px;
      margin-top: 5px; padding: 3px 9px; border-radius: 50px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.04em;
      border: 1.5px solid transparent;
    }
    .card-badge.fica  { background: var(--fica-bg);  color: var(--fica-color);  border-color: var(--fica-border); }
    .card-badge.fesmc { background: var(--fesmc-bg); color: var(--fesmc-color); border-color: var(--fesmc-border); }
    .card-badge.sp    { background: var(--sp-bg);    color: var(--sp-color);    border-color: var(--sp-border); }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.6; }

    .card-trab-block { text-align: right; flex-shrink: 0; }
    .card-trab-num {
      font-family: var(--mono); font-size: 26px; font-weight: 700;
      line-height: 1; letter-spacing: -0.02em;
    }
    .card-trab-num.fica  { color: var(--fica-color); }
    .card-trab-num.fesmc { color: var(--fesmc-color); }
    .card-trab-num.sp    { color: var(--sp-color); }
    .card-trab-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-top: 2px; }
    .card-cif { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text-3); margin-top: 4px; }

    /* cnae row */
    .card-cnae {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 10px; border-radius: 10px;
      background: var(--bg); margin-bottom: 10px;
      font-size: 12px;
    }
    .cnae-code {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      color: var(--text); flex-shrink: 0; white-space: nowrap;
    }
    .cnae-desc { color: var(--text-2); font-weight: 500; line-height: 1.4; }

    /* location */
    .card-loc { margin-bottom: 12px; }
    .card-loc-city { font-size: 13px; font-weight: 700; color: var(--text); text-transform: uppercase; margin-bottom: 3px; }
    .card-loc-addr { font-size: 12px; color: var(--text-2); font-weight: 400; line-height: 1.4; }

    /* divider */
    .card-divider { height: 1px; background: var(--border); margin: 0 0 12px; }

    /* actions */
    .card-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .card-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 10px 4px; border-radius: 12px; border: none;
      font-family: var(--font); font-size: 10px; font-weight: 800;
      letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: transform 0.12s, opacity 0.12s;
    }
    .card-btn:active { transform: scale(0.94); opacity: 0.85; }
    .card-btn svg { width: 18px; height: 18px; }
    .card-btn.maps    { background: var(--text); color: #fff; }
    .card-btn.whatsapp{ background: #16a34a; color: #fff; }
    .card-btn.google  { background: var(--bg); color: var(--text-2); border: 1.5px solid var(--border); }

    /* ── EMPTY / LOAD MORE ── */
    .state-box { text-align: center; padding: 60px 20px; }
    .state-icon { width: 64px; height: 64px; border-radius: 20px; background: var(--bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .state-icon svg { width: 32px; height: 32px; }
    .state-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .state-text { font-size: 13px; color: var(--text-2); line-height: 1.6; }

    .load-more-wrap { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .load-more-btn {
      width: 100%; max-width: 400px; padding: 15px 24px;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: #fff; font-family: var(--font);
      font-size: 15px; font-weight: 700; color: var(--text);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.18s, color 0.18s, transform 0.1s;
    }
    .load-more-btn:hover { border-color: var(--red); color: var(--red); }
    .load-more-btn:active { transform: scale(0.97); }
    .load-more-btn svg { width: 18px; height: 18px; }
    .load-more-info { font-size: 12px; font-weight: 500; color: var(--text-3); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-badge">UGT Castilla-La Mancha</div>
      <h1>Censo <span>2026</span></h1>
      <p class="header-sub">Ciudad Real · Base de datos de empresas blancas ... </p>
    </div>
  </header>

  <!-- SEARCH ZONE -->
  <div class="search-zone">
    <div class="search-wrap">
      <div class="search-box">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <input type="search" id="buscador"
          placeholder="Empresa, localidad o CNAE..."
          autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">
        <button class="clear-btn" id="clear-btn" aria-label="Limpiar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="filters-row" id="filtros">
        <button class="filter-pill active-all"  data-fed="TODAS">Todas</button>
        <button class="filter-pill" data-fed="FICA">● FICA</button>
        <button class="filter-pill" data-fed="FESMC">● FESMC</button>
        <button class="filter-pill" data-fed="UGT-SP">● UGT-SP</button>
      </div>
    </div>
  </div>

  <!-- META BAR -->
  <div class="meta-bar">
    <span class="stats-count" id="stats-bar"></span>
    <button class="btn-export" onclick="exportarCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Exportar CSV
    </button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="empresa-list" id="lista-empresas"></div>

    <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
      <button class="load-more-btn" id="load-more-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        <span id="load-more-label">Cargar más</span>
      </button>
      <span class="load-more-info" id="load-more-info"></span>
    </div>

    <div id="empty-state" class="state-box" style="display:none;">
      <div class="state-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <p class="state-title">Sin resultados</p>
      <p class="state-text" id="empty-text">Prueba con otro término<br>o cambia el filtro de federación</p>
    </div>
  </div>

  <script src="datos.js"></script>
  <script>
    const buscador    = document.getElementById('buscador');
    const clearBtn    = document.getElementById('clear-btn');
    const lista       = document.getElementById('lista-empresas');
    const statsBar    = document.getElementById('stats-bar');
    const emptyState  = document.getElementById('empty-state');
    const emptyText   = document.getElementById('empty-text');
    const loadMoreWrap = document.getElementById('load-more-wrap');
    const loadMoreBtn  = document.getElementById('load-more-btn');
    const loadMoreLabel= document.getElementById('load-more-label');
    const loadMoreInfo = document.getElementById('load-more-info');

    let filtroActivo  = 'TODAS';
    let visibleCount  = 60;
    const PAGE_SIZE   = 60;
    let dataParaExportar = [];
    let debounceTimer;

    // ── UTILS ──
    function fedClass(fed) {
      if (!fed) return '';
      const f = fed.toUpperCase();
      if (f === 'FICA')   return 'fica';
      if (f === 'FESMC')  return 'fesmc';
      if (f.includes('SP')) return 'sp';
      return '';
    }

    function cardType(fed) { return fedClass(fed) || 'fica'; }

    // ── EXPORT ──
    function exportarCSV() {
      if (!dataParaExportar.length) return;
      let csv = "Empresa;CIF;Federacion;Trabajadores;Localidad;Direccion;CNAE;Descripcion\n";
      dataParaExportar.forEach(e => {
        csv += `"${e.empresa}";"${e.cif}";"${e.federacion}";${e.trabajadores};"${e.localidad}";"${e.direccion}";"${e.cnae || ''}";"${e.desc_cnae || ''}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.setAttribute('download', 'Censo_CiudadReal.csv');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // ── WHATSAPP ──
    function enviarWhatsApp(e) {
      const msg = `*DATOS EMPRESA - CENSO 2026*%0A%0A` +
        `🏢 *Empresa:* ${e.empresa}%0A` +
        `🆔 *CIF:* ${e.cif}%0A` +
        `🚩 *Fed:* ${e.federacion}%0A` +
        `👥 *Trab:* ${e.trabajadores}%0A` +
        `📍 *Loc:* ${e.localidad}%0A` +
        `🏠 *Dir:* ${e.direccion}%0A` +
        `📦 *CNAE:* ${e.cnae || '-'}%0A` +
        `📝 *Actividad:* ${e.desc_cnae || ''}`;
      window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
    }

    // ── RENDER ──
    function render() {
      if (typeof empresas === 'undefined') {
        lista.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-3)">Cargando datos...</div>';
        return;
      }

      const q = buscador.value.toLowerCase().trim();
      const filtrados = empresas.filter(e => {
        const matchQ = !q ||
          e.empresa.toLowerCase().includes(q) ||
          (e.localidad || '').toLowerCase().includes(q) ||
          (e.cnae && e.cnae.toString().includes(q));
        const fedKey = (e.federacion || '').toUpperCase();
        const matchF = filtroActivo === 'TODAS' || fedKey === filtroActivo;
        return matchQ && matchF;
      }).sort((a, b) => (parseInt(b.trabajadores) || 0) - (parseInt(a.trabajadores) || 0));

      dataParaExportar = filtrados;
      const totalTrab = filtrados.reduce((s, e) => s + (parseInt(e.trabajadores) || 0), 0);
      const total = filtrados.length;
      const hayMas = total > visibleCount;
      const mostrar = filtrados.slice(0, visibleCount);
      const restantes = total - visibleCount;

      statsBar.innerHTML = `<strong>${total}</strong> empresa${total !== 1 ? 's' : ''} · <strong>${totalTrab.toLocaleString()}</strong> trabajadores`;

      if (total === 0) {
        lista.innerHTML = '';
        loadMoreWrap.style.display = 'none';
        emptyState.style.display = '';
        emptyText.innerHTML = filtroActivo !== 'TODAS'
          ? `Sin resultados en <strong>${filtroActivo}</strong>`
          : 'Prueba con otro término o cambia el filtro';
        return;
      }

      emptyState.style.display = 'none';

      lista.innerHTML = mostrar.map((e, i) => {
        const cls  = fedClass(e.federacion);
        const type = cardType(e.federacion);
        const mapQ = encodeURIComponent((e.direccion || '') + ', ' + (e.localidad || ''));
        const gooQ = encodeURIComponent((e.empresa || '') + ' ' + (e.localidad || ''));
        const safeEmpresa = (e.empresa || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

        return `
        <div class="empresa-card type-${type}" style="animation-delay:${Math.min(i*15,300)}ms">
          <div class="card-inner">
            <div class="card-top">
              <div>
                <div class="card-empresa">${e.empresa}</div>
                <span class="card-badge ${cls}"><span class="badge-dot"></span>${e.federacion || '-'}</span>
              </div>
              <div class="card-trab-block">
                <div class="card-trab-num ${cls}">${e.trabajadores ?? '–'}</div>
                <div class="card-trab-label">trabajadores</div>
                <div class="card-cif">${e.cif || ''}</div>
              </div>
            </div>

            ${e.cnae ? `
            <div class="card-cnae">
              <span class="cnae-code">CNAE ${e.cnae}</span>
              <span class="cnae-desc">${e.desc_cnae || ''}</span>
            </div>` : ''}

            <div class="card-loc">
              <div class="card-loc-city">
                <svg style="width:12px;height:12px;vertical-align:-1px;margin-right:4px;opacity:.4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${e.localidad || ''}
              </div>
              <div class="card-loc-addr">${e.direccion || ''}</div>
            </div>

            <div class="card-divider"></div>

            <div class="card-actions">
              <button class="card-btn maps"
                onclick="window.open('https://www.google.com/maps/search/?api=1&query=${mapQ}','_blank')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                Ruta
              </button>
              <button class="card-btn whatsapp"
                onclick='enviarWhatsApp(${JSON.stringify(e)})'>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 12.86 19.79 19.79 0 01.02 4.22 2 2 0 012 2.02h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                WhatsApp
              </button>
              <button class="card-btn google"
                onclick="window.open('https://google.com/search?q=${gooQ}','_blank')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Google
              </button>
            </div>
          </div>
        </div>`;
      }).join('');

      if (hayMas) {
        const sig = Math.min(PAGE_SIZE, restantes);
        loadMoreLabel.textContent = `Cargar ${sig} más`;
        loadMoreInfo.textContent = `${restantes} empresa${restantes !== 1 ? 's' : ''} restante${restantes !== 1 ? 's' : ''}`;
        loadMoreWrap.style.display = 'flex';
      } else {
        loadMoreWrap.style.display = 'none';
      }
    }

    // ── EVENTS ──
    buscador.addEventListener('input', e => {
      visibleCount = PAGE_SIZE;
      clearBtn.classList.toggle('visible', e.target.value.length > 0);
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(render, 150);
    });

    clearBtn.addEventListener('click', () => {
      buscador.value = '';
      visibleCount = PAGE_SIZE;
      clearBtn.classList.remove('visible');
      render();
      buscador.focus();
    });

    document.getElementById('filtros').addEventListener('click', e => {
      const pill = e.target.closest('.filter-pill');
      if (!pill) return;
      filtroActivo = pill.dataset.fed;
      visibleCount = PAGE_SIZE;
      document.querySelectorAll('.filter-pill').forEach(p => p.className = 'filter-pill');
      const map = { TODAS:'active-all', FICA:'active-fica', FESMC:'active-fesmc', 'UGT-SP':'active-sp' };
      pill.classList.add(map[filtroActivo] || 'active-all');
      render();
    });

    loadMoreBtn.addEventListener('click', () => {
      const prev = visibleCount;
      visibleCount += PAGE_SIZE;
      render();
      const cards = lista.querySelectorAll('.empresa-card');
      if (cards[prev]) cards[prev].scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ── INIT ──
    window.addEventListener('load', () => setTimeout(render, 300));

    // ── SERVICE WORKER ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(r => console.log('SW:', r.scope))
          .catch(e => console.log('SW error:', e));
      });
    }
  </script>
</body>
</html>
