<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Censo Ciudad Real 2026</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "fica": "#0284c7",
                        "fesmc": "#f59e0b",
                        "ugtsp": "#dc2626",
                    },
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f1f5f9; padding-bottom: 100px; }
        .card-fica { border: 1px solid #bae6fd; border-left: 8px solid #0284c7; background-color: #f0f9ff; }
        .card-fesmc { border: 1px solid #fef3c7; border-left: 8px solid #f59e0b; background-color: #fffbeb; }
        .card-ugtsp { border: 1px solid #fecaca; border-left: 8px solid #dc2626; background-color: #fef2f2; }
    </style>
</head>
<body class="text-slate-900">

<header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-md">
    <div class="px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-slate-800 font-black">fact_check</span>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-800 uppercase">Censo 2026</h1>
        </div>
        <div class="text-[10px] font-black text-white bg-slate-800 px-2 py-1 rounded">CIUDAD REAL</div>
    </div>

    <div class="px-5 pb-4 space-y-4">
        <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input id="buscador" class="w-full bg-slate-50 border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm focus:ring-2 focus:ring-slate-400 transition-all outline-none shadow-inner" placeholder="Buscar por nombre, CIF, pueblo o CNAE..." type="text"/>
        </div>
        
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="filtros">
            <button class="filter-btn px-4 py-2 rounded-lg bg-slate-800 text-white text-[11px] font-black uppercase transition-all shadow-md" data-fed="TODAS">Todos</button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-white border-2 border-fica text-fica text-[11px] font-black uppercase transition-all shadow-sm" data-fed="FICA">FICA</button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-white border-2 border-fesmc text-fesmc text-[11px] font-black uppercase transition-all shadow-sm" data-fed="FESMC">FESMC</button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-white border-2 border-ugtsp text-ugtsp text-[11px] font-black uppercase transition-all shadow-sm" data-fed="UGT-SP">UGT-SP</button>
        </div>
    </div>

    <div id="stats-bar" class="flex border-t border-slate-100 bg-slate-50 px-5 py-2.5 justify-between items-center text-[10px]"></div>
</header>

<main class="px-5 py-6">
    <div id="lista-empresas" class="grid gap-4"></div>
</main>

<button id="btn-exportar" class="fixed bottom-6 right-6 bg-emerald-600 text-white p-4 rounded-full shadow-2xl flex items-center gap-2 hover:bg-emerald-700 active:scale-90 transition-all z-[60]">
    <span class="material-symbols-outlined">download</span>
    <span class="text-xs font-black uppercase pr-1">Exportar CSV</span>
</button>

<script src="datos.js"></script>

<script>
    const buscador = document.getElementById('buscador');
    const lista = document.getElementById('lista-empresas');
    const statsBar = document.getElementById('stats-bar');
    const filtrosBtn = document.querySelectorAll('.filter-btn');
    const btnExportar = document.getElementById('btn-exportar');
    
    let filtroActivo = 'TODAS';
    let actualesFiltrados = [];

    const configFed = {
        'FICA': { card: 'card-fica', text: 'text-fica', badge: 'bg-fica text-white' },
        'FESMC': { card: 'card-fesmc', text: 'text-fesmc', badge: 'bg-fesmc text-white' },
        'UGT-SP': { card: 'card-ugtsp', text: 'text-ugtsp', badge: 'bg-ugtsp text-white' }
    };

    function enviarWhatsApp(empresa, cif, fed, trabajadores, loc, dir) {
        const urlMaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dir + ', ' + loc)}`;
        const mensaje = `*DATOS EMPRESA - CENSO 2026*%0A%0A` +
                        `*🏢 Empresa:* ${empresa}%0A` +
                        `*🆔 CIF:* ${cif}%0A` +
                        `*🚩 Fed:* ${fed}%0A` +
                        `*👥 Trab:* ${trabajadores}%0A` +
                        `*📍 Loc:* ${loc}%0A` +
                        `*🏠 Dir:* ${dir}%0A%0A` +
                        `*🗺️ Ver en Maps:* ${urlMaps}`;
        
        window.open(`https://api.whatsapp.com/send?text=${mensaje}`, '_blank');
    }

    function exportarCSV() {
        if (actualesFiltrados.length === 0) return;
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Empresa;CIF;Federacion;Trabajadores;Localidad;CP;Direccion;CNAE;Descripcion\n";
        actualesFiltrados.forEach(e => {
            const fila = [`"${e.empresa}"`, `"${e.cif}"`, `"${e.federacion}"`, e.trabajadores, `"${e.localidad}"`, `"${e.cp}"`, `"${e.direccion}"`, `"${e.cnae}"`, `"${e.desc_cnae}"` ];
            csvContent += fila.join(";") + "\n";
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Censo_CR_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function abrirRuta(dir, loc, cp) {
        const query = encodeURIComponent(`${dir}, ${loc}, ${cp}, España`);
        window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
    }

    function actualizarStats(data) {
        const total = data.length;
        const empleados = data.reduce((acc, curr) => acc + (parseInt(curr.trabajadores) || 0), 0);
        statsBar.innerHTML = `
            <div class="flex gap-4 items-center">
                <span class="font-black text-slate-700 uppercase tracking-tighter">Resultados:</span>
                <span class="font-bold text-slate-600 underline decoration-slate-300 underline-offset-4">${total} Emp.</span>
                <span class="font-bold text-slate-600 underline decoration-slate-300 underline-offset-4">${empleados.toLocaleString()} Trab.</span>
            </div>
        `;
    }

    function render(query = '') {
        if (typeof empresas === 'undefined') {
            lista.innerHTML = '<div class="py-10 text-center text-slate-400 text-sm italic">Cargando...</div>';
            return;
        }

        const q = query.toLowerCase().trim();
        actualesFiltrados = empresas.filter(e => {
            const matchesQuery = e.empresa.toLowerCase().includes(q) || e.localidad.toLowerCase().includes(q) || e.cnae.toLowerCase().includes(q) || e.cif.toLowerCase().includes(q);
            const fedKey = (e.federacion || '').toUpperCase();
            const matchesFed = filtroActivo === 'TODAS' ? true : fedKey === filtroActivo;
            return matchesQuery && matchesFed;
        });

        actualesFiltrados.sort((a, b) => (parseInt(b.trabajadores) || 0) - (parseInt(a.trabajadores) || 0));
        actualizarStats(actualesFiltrados);

        if (actualesFiltrados.length === 0) {
            lista.innerHTML = '<div class="py-20 text-center text-slate-400 text-sm font-medium">Sin resultados</div>';
            btnExportar.style.display = 'none';
            return;
        }

        btnExportar.style.display = 'flex';

        lista.innerHTML = actualesFiltrados.slice(0, 80).map(e => {
            const fedKey = (e.federacion || '').toUpperCase();
            const estilo = configFed[fedKey] || { card: 'bg-white border-slate-200', text: 'text-slate-600', badge: 'bg-slate-500 text-white' };
            
            return `
            <div class="rounded-xl p-5 shadow-sm active:scale-[0.98] transition-all ${estilo.card}">
                <div class="flex justify-between items-start gap-4 mb-3">
                    <div class="space-y-1.5 flex-1">
                        <h3 class="font-black text-[14px] text-slate-800 leading-tight uppercase">${e.empresa}</h3>
                        <span class="inline-block px-2 py-0.5 rounded text-[9px] font-black tracking-widest ${estilo.badge}">
                            ${e.federacion || 'N/A'}
                        </span>
                    </div>
                    <div class="text-right shrink-0">
                        <span class="block text-[10px] font-bold text-slate-400 mb-1">${e.cif}</span>
                        <div class="flex items-center justify-end gap-1.5 font-black ${estilo.text}">
                            <span class="material-symbols-outlined text-[24px]">groups</span>
                            <span class="text-2xl tracking-tighter">${e.trabajadores}</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-start gap-2 text-[11px] text-slate-700 font-semibold mb-4 pb-1">
                    <span class="material-symbols-outlined text-[16px] text-slate-400 mt-0.5">inventory_2</span>
                    <div class="flex flex-col">
                        <span>CNAE: ${e.cnae || 'N/A'}</span>
                        <span class="text-[10px] leading-tight text-slate-500 font-medium italic">${e.desc_cnae || 'Sin descripción'}</span>
                    </div>
                </div>
                
                <div class="space-y-2 mb-5 border-t border-slate-200/50 pt-3 text-slate-700">
                    <div class="flex items-center gap-2.5 font-black uppercase text-[11px]">
                        <span class="material-symbols-outlined text-[18px] opacity-30">location_on</span>
                        <span>${e.localidad} <span class="opacity-40 font-bold ml-1">(${e.cp})</span></span>
                    </div>
                    <div class
