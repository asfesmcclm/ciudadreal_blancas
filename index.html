<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Censo Ciudad Real 2026</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e293b",
                        "accent": "#4f46e5",
                        "blanca": "#ef4444",
                        "si": "#10b981",
                    },
                    fontFamily: { "sans": ["Inter", "system-ui"] },
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f8fafc; }
        .card-blanca { border: 1px solid #e2e8f0; border-left: 6px solid #ef4444; }
        .card-si { border: 1px solid #e2e8f0; border-left: 6px solid #10b981; }
    </style>
</head>
<body class="text-slate-900">

<header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
    <div class="px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-slate-700 font-bold">analytics</span>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-800">Censo 2026</h1>
        </div>
        <div class="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded">CIUDAD REAL</div>
    </div>

    <div class="px-5 pb-4 space-y-3">
        <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input id="buscador" class="w-full bg-slate-50 border-slate-200 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-accent/20 transition-all" placeholder="Buscar empresa, localidad o CIF..." type="text"/>
        </div>
        
        <div class="flex gap-2 overflow-x-auto no-scrollbar" id="filtros">
            <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-slate-800 text-white text-[11px] font-bold transition-all" data-tipo="TODAS">Todas</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 text-[11px] font-bold transition-all" data-tipo="FICA">FICA</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 text-[11px] font-bold transition-all" data-tipo="FESMC">FESMC</button>
            <button class="filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 text-[11px] font-bold transition-all" data-tipo="UGT-SP">UGT-SP</button>
        </div>
    </div>

    <div id="stats-bar" class="flex border-t border-slate-100 bg-slate-50/50 px-5 py-2 justify-between items-center"></div>
</header>

<main class="px-5 py-6 space-y-4">
    <div id="lista-empresas" class="space-y-4"></div>
</main>

<script src="datos.js"></script>

<script>
    const buscador = document.getElementById('buscador');
    const lista = document.getElementById('lista-empresas');
    const statsBar = document.getElementById('stats-bar');
    const filtrosBtn = document.querySelectorAll('.filter-btn');
    
    let filtroFederacion = 'TODAS';

    function abrirRuta(direccion, localidad, cp) {
        if (!direccion || direccion.includes('S/N') && direccion.length < 5) {
            // Si la dirección es pobre, buscamos por localidad
            const destino = `${localidad}, ${cp}, Ciudad Real`;
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destino)}`, '_blank');
        } else {
            const destinoFull = `${direccion}, ${localidad}, ${cp}, España`;
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destinoFull)}`, '_blank');
        }
    }

    function actualizarStats(data) {
        const total = data.length;
        const trabajadores = data.reduce((acc, curr) => acc + (parseInt(curr.trabajadores) || 0), 0);
        
        statsBar.innerHTML = `
            <div class="flex items-center gap-4 w-full">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Vistas:</span>
                <div class="flex gap-4">
                    <span class="text-[11px] font-bold text-slate-700">${total} <span class="font-medium text-slate-400">Empresas</span></span>
                    <span class="text-[11px] font-bold text-accent">${trabajadores.toLocaleString()} <span class="font-medium text-slate-400">Trabajadores</span></span>
                </div>
            </div>
        `;
    }

    function render(query = '') {
        if (typeof empresas === 'undefined') {
            lista.innerHTML = '<div class="py-10 text-center text-slate-400 text-xs font-medium italic">Base de datos no encontrada. Genera datos.js primero.</div>';
            return;
        }

        const q = query.toLowerCase().trim();
        const filtrados = empresas.filter(e => {
            const matchQuery = e.empresa.toLowerCase().includes(q) || 
                               e.localidad.toLowerCase().includes(q) || 
                               e.cif.toLowerCase().includes(q) ||
                               e.cnae.toLowerCase().includes(q);
            
            const matchFed = filtroFederacion === 'TODAS' ? true : e.federacion === filtroFederacion;
            
            return matchQuery && matchFed;
        });

        actualizarStats(filtrados);

        if (filtrados.length === 0) {
            lista.innerHTML = '<div class="py-20 text-center text-slate-400 text-sm italic font-medium">No se han encontrado resultados</div>';
            return;
        }

        // Limitamos a 100 para fluidez en el móvil
        lista.innerHTML = filtrados.slice(0, 100).map(e => {
            return `
            <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex-1">
                        <h3 class="font-extrabold text-sm text-slate-800 leading-tight uppercase mb-1">${e.empresa}</h3>
                        <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-blue-50 text-blue-600 uppercase">
                            ${e.federacion}
                        </span>
                    </div>
                    <div class="text-right">
                        <span class="block text-[10px] font-black text-slate-400">${e.cif}</span>
                        <span class="text-[10px] font-bold text-slate-500">${e.trabajadores} empl.</span>
                    </div>
                </div>
                
                <div class="space-y-2 mb-4">
                    <div class="flex items-start gap-2 text-[11px] text-slate-600 font-medium">
                        <span class="material-symbols-outlined text-[16px] text-slate-400">location_on</span>
                        <div class="flex flex-col">
                            <span class="text-slate-800">${e.localidad} (${e.cp})</span>
                            <span class="text-[10px] text-slate-400 italic">${e.direccion}</span>
                        </div>
                    </div>
                    <div class="flex items-start gap-2 text-[11px] text-slate-600 font-medium">
                        <span class="material-symbols-outlined text-[16px] text-slate-400">inventory_2</span>
                        <span class="leading-tight text-[10px]">${e.desc_cnae}</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="abrirRuta('${e.direccion.replace(/'/g, "\\'")}', '${e.localidad}', '${e.cp}')" 
                        class="bg-slate-800 text-white py-2.5 rounded-lg text-[10px] font-bold uppercase flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-sm">directions_car</span> Ruta
                    </button>
                    
                    <button onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(e.empresa + ' ' + e.localidad)}', '_blank')" 
                        class="border border-slate-200 text-slate-600 py-2.5 rounded-lg text-[10px] font-bold uppercase flex items-center justify-center gap-2 active:bg-slate-50 transition-all">
                        <span class="material-symbols-outlined text-sm">search</span> Google
                    </button>
                </div>
            </div>
        `}).join('');
    }

    filtrosBtn.forEach(btn => btn.addEventListener('click', () => {
        filtrosBtn.forEach(b => {
            b.className = "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 text-[11px] font-bold transition-all";
        });
        btn.className = "filter-btn whitespace-nowrap px-4 py-1.5 rounded-full bg-slate-800 text-white text-[11px] font-bold transition-all";
        filtroFederacion = btn.dataset.tipo;
        render(buscador.value);
    }));

    buscador.addEventListener('input', (e) => render(e.target.value));
    
    // Inicialización
    window.onload = () => {
        if (typeof empresas !== 'undefined') {
            render();
        } else {
            setTimeout(render, 500);
        }
    };
</script>
</body>
</html>
