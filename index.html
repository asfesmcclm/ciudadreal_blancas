<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Censo Ciudad Real 2026</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "fica": "#0284c7",
                        "fesmc": "#f59e0b",
                        "ugtsp": "#dc2626",
                    },
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f1f5f9; }
        .card-fica { border: 1px solid #bae6fd; border-left: 8px solid #0284c7; background-color: #f0f9ff; }
        .card-fesmc { border: 1px solid #fef3c7; border-left: 8px solid #f59e0b; background-color: #fffbeb; }
        .card-ugtsp { border: 1px solid #fecaca; border-left: 8px solid #dc2626; background-color: #fef2f2; }
    </style>
</head>
<body class="text-slate-900">

<header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-md">
    <div class="px-5 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-slate-800 font-black">fact_check</span>
            <h1 class="text-lg font-extrabold tracking-tight text-slate-800 uppercase">Censo 2026</h1>
        </div>
        <div class="text-[10px] font-black text-white bg-slate-800 px-2 py-1 rounded tracking-tighter">CIUDAD REAL</div>
    </div>

    <div class="px-5 pb-4 space-y-4">
        <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input id="buscador" class="w-full bg-slate-50 border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm focus:ring-2 focus:ring-slate-400 transition-all outline-none" placeholder="Buscar por nombre, CIF, pueblo o CNAE..." type="text"/>
        </div>
        
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="filtros">
            <button class="filter-btn px-4 py-2 rounded-lg bg-slate-800 text-white text-[11px] font-black uppercase transition-all shadow-md" data-fed="TODAS">Todos</button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-white border-2 border-fica text-fica text-[11px] font-black uppercase transition-all shadow-sm" data-fed="FICA">FICA</button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-white border-2 border-fesmc text-fesmc text-[11px] font-black uppercase transition-all shadow-sm" data-fed="FESMC">FESMC</button>
            <button class="filter-btn px-4 py-2 rounded-lg bg-white border-2 border-ugtsp text-ugtsp text-[11px] font-black uppercase transition-all shadow-sm" data-fed="UGT-SP">UGT-SP</button>
        </div>
    </div>

    <div class="flex border-t border-slate-100 bg-slate-50 px-5 py-2 justify-between items-center text-[10px]">
        <div id="stats-bar" class="flex gap-3 items-center font-bold text-slate-500 uppercase"></div>
        <button onclick="exportarCSV()" class="flex items-center gap-1 bg-emerald-600 text-white px-3 py-1.5 rounded-md font-black uppercase tracking-tighter text-[9px] active:scale-95 transition-transform">
            <span class="material-symbols-outlined text-sm">download</span> CSV
        </button>
    </div>
</header>

<main class="px-5 py-6">
    <div id="lista-empresas" class="grid gap-4"></div>
</main>

<script src="datos.js"></script>

<script>
    const buscador = document.getElementById('buscador');
    const lista = document.getElementById('lista-empresas');
    const statsBar = document.getElementById('stats-bar');
    const filtrosBtn = document.querySelectorAll('.filter-btn');
    
    let filtroActivo = 'TODAS';
    let dataParaExportar = [];

    const configFed = {
        'FICA': { card: 'card-fica', text: 'text-fica', badge: 'bg-fica text-white' },
        'FESMC': { card: 'card-fesmc', text: 'text-fesmc', badge: 'bg-fesmc text-white' },
        'UGT-SP': { card: 'card-ugtsp', text: 'text-ugtsp', badge: 'bg-ugtsp text-white' }
    };

    function exportarCSV() {
        if (!dataParaExportar.length) return;
        let csv = "Empresa;CIF;Federacion;Trabajadores;Localidad;Direccion;CNAE\n";
        dataParaExportar.forEach(e => {
            csv += `"${e.empresa}";"${e.cif}";"${e.federacion}";${e.trabajadores};"${e.localidad}";"${e.direccion}";"${e.cnae}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "Censo_CR.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function enviarWhatsApp(empresa, cif, fed, trab, loc, dir) {
        const msg = `*EMPRESA:* ${empresa}%0A*CIF:* ${cif}%0A*FED:* ${fed}%0A*TRAB:* ${trab}%0A*LOC:* ${loc}%0A*DIR:* ${dir}`;
        window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
    }

    function render(query = '') {
        if (typeof empresas === 'undefined') return;

        const q = query.toLowerCase().trim();
        const filtrados = empresas.filter(e => {
            const matchesQuery = e.empresa.toLowerCase().includes(q) || e.localidad.toLowerCase().includes(q) || (e.cnae && e.cnae.includes(q));
            const fedKey = (e.federacion || '').toUpperCase();
            const matchesFed = filtroActivo === 'TODAS' ? true : fedKey === filtroActivo;
            return matchesQuery && matchesFed;
        }).sort((a, b) => (parseInt(b.trabajadores) || 0) - (parseInt(a.trabajadores) || 0));

        dataParaExportar = filtrados;
        
        const totalTrab = filtrados.reduce((acc, curr) => acc + (parseInt(curr.trabajadores) || 0), 0);
        statsBar.innerHTML = `<span>${filtrados.length} EMP.</span> <span>|</span> <span>${totalTrab.toLocaleString()} TRAB.</span>`;

        lista.innerHTML = filtrados.slice(0, 50).map(e => {
            const fedKey = (e.federacion || '').toUpperCase();
            const estilo = configFed[fedKey] || { card: 'bg-white border-slate-200', text: 'text-slate-600', badge: 'bg-slate-500 text-white' };
            
            return `
            <div class="rounded-xl p-5 shadow-sm ${estilo.card}">
                <div class="flex justify-between items-start gap-4 mb-3">
                    <div class="flex-1">
                        <h3 class="font-black text-[13px] text-slate-800 uppercase leading-tight">${e.empresa}</h3>
                        <span class="inline-block px-2 py-0.5 mt-1 rounded text-[9px] font-black ${estilo.badge}">${e.federacion}</span>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center justify-end gap-1 font-black ${estilo.text}">
                            <span class="material-symbols-outlined text-[20px]">groups</span>
                            <span class="text-2xl">${e.trabajadores}</span>
                        </div>
                        <span class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">${e.cif}</span>
                    </div>
                </div>

                <div class="text-[10px] text-slate-600 mb-4 font-semibold italic">
                    CNAE: ${e.cnae || '-'} | ${e.desc_cnae || ''}
                </div>
                
                <div class="space-y-1 mb-5 border-t border-slate-200/50 pt-3">
                    <div class="flex items-center gap-2 text-[10px] font-black uppercase text-slate-700">
                        <span class="material-symbols-outlined text-sm opacity-30">location_on</span> ${e.localidad}
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-slate-500">
                        <span class="material-symbols-outlined text-sm opacity-30">map</span> ${e.direccion}
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button onclick="window.open('http://maps.google.com/?q=${encodeURIComponent(e.direccion + ' ' + e.localidad)}', '_blank')" 
                        class="bg-slate-800 text-white py-2.5 rounded-lg text-[9px] font-black uppercase flex flex-col items-center gap-1">
                        <span class="material-symbols-outlined text-sm">near_me</span> RUTA
                    </button>
                    <button onclick="enviarWhatsApp('${e.empresa.replace(/'/g, "")}', '${e.cif}', '${e.federacion}', '${e.trabajadores}', '${e.localidad}', '${e.direccion.replace(/'/g, "")}')" 
                        class="bg-emerald-500 text-white py-2.5 rounded-lg text-[9px] font-black uppercase flex flex-col items-center gap-1">
                        <span class="material-symbols-outlined text-sm">share</span> WHATSAPP
                    </button>
                    <button onclick="window.open('https://google.com/search?q=${encodeURIComponent(e.empresa)}', '_blank')" 
                        class="bg-white border border-slate-200 text-slate-600 py-2.5 rounded-lg text-[9px] font-black uppercase flex flex-col items-center gap-1">
                        <span class="material-symbols-outlined text-sm">search</span> GOOGLE
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    // Filtros
    filtrosBtn.forEach(btn => btn.addEventListener('click', () => {
        filtrosBtn.forEach(b => {
            b.className = b.dataset.fed === 'TODAS' ? 
                "filter-btn px-4 py-2 rounded-lg bg-white border-2 border-slate-800 text-slate-800 text-[11px] font-black uppercase" :
                `filter-btn px-4 py-2 rounded-lg bg-white border-2 border-${b.dataset.fed.toLowerCase().replace('-', '')} text-${b.dataset.fed.toLowerCase().replace('-', '')} text-[11px] font-black uppercase`;
        });
        const color = btn.dataset.fed === 'TODAS' ? 'slate-800' : btn.dataset.fed.toLowerCase().replace('-', '');
        btn.className = `filter-btn px-4 py-2 rounded-lg bg-${color} text-white text-[11px] font-black uppercase shadow-md`;
        filtroActivo = btn.dataset.fed;
        render(buscador.value);
    }));

    buscador.addEventListener('input', (e) => render(e.target.value));
    
    // Forzar carga inicial
    window.onload = () => {
        setTimeout(() => {
            if (typeof empresas !== 'undefined') render();
            else console.error("datos.js no cargado");
        }, 300);
    };
</script>
</body>
</html>
